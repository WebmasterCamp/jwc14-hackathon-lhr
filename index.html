<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Capturow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brown-dark:  #2C1F14;
      --accent-pink: #F4A89A;
      --accent-cream:#F5EDE0;
      --text-light:  #F5EFE6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', 'Mitr', sans-serif;
      background: #1a1008;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .phone-shell {
      width: 100%; max-width: 420px;
      min-height: 100dvh;
      background: var(--brown-dark);
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }
    .page { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .page.active { display: flex; }
    .top-bar { display:flex; align-items:center; justify-content:space-between; padding:18px 20px 10px; flex-shrink:0; }
    .page-pill {
      background: var(--accent-pink); color: #2C1F14;
      font-family: 'Dancing Script', cursive; font-weight: 700; font-size: 22px;
      padding: 5px 24px; border-radius: 999px;
    }
    .profile-btn {
      width:40px; height:40px; border-radius:50%;
      background:rgba(255,255,255,0.12);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; border:none; color:var(--text-light);
    }
    .bottom-nav {
      display:flex; justify-content:space-around; align-items:center;
      padding:10px 0 20px;
      border-top:1px solid rgba(255,255,255,0.07);
      background: var(--brown-dark); flex-shrink:0;
    }
    .nav-btn {
      display:flex; flex-direction:column; align-items:center; gap:4px;
      background:none; border:none; color:rgba(255,255,255,0.4);
      font-size:10px; font-family:'Mitr',sans-serif;
      cursor:pointer; padding:6px 16px; border-radius:12px; transition:color 0.2s;
    }
    .nav-btn.active { color: var(--accent-pink); }
    .nav-btn svg { width:22px; height:22px; }
    .toast {
      position:fixed; bottom:32px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:rgba(30,20,10,0.92); color:var(--text-light);
      padding:12px 24px; border-radius:999px; font-size:14px;
      font-family:'Mitr',sans-serif; backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.12);
      transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index:999; white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* CAMERA PAGE */
    .scroll-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
    .scroll-area::-webkit-scrollbar { display:none; }
    .viewfinder-wrap {
      margin:8px 16px 0; border-radius:24px;
      overflow:hidden; background:#1a1008;
      aspect-ratio:1/1; position:relative;
    }
    #webcam { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }
    .cam-placeholder {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:12px;
      color:rgba(255,255,255,0.35); font-size:15px; font-family:'Mitr',sans-serif;
    }
    .cam-placeholder svg { opacity:0.3; }
    .flash-overlay { position:absolute; inset:0; background:white; opacity:0; pointer-events:none; border-radius:24px; transition:opacity 0.05s; }
    .flash-overlay.flash { opacity:1; }
    .start-cam-overlay { position:absolute; inset:0; cursor:pointer; z-index:10; border-radius:24px; }
    .cam-status { position:absolute; top:12px; right:12px; width:10px; height:10px; border-radius:50%; background:#ef4444; z-index:5; }
    .cam-status.live { background:#22c55e; animation:blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .voice-icon {
      position:absolute; bottom:12px; left:12px; width:36px; height:36px;
      background:rgba(139,92,246,0.25); border-radius:50%;
      display:flex; align-items:center; justify-content:center; cursor:not-allowed; opacity:0.6;
    }
    .controls-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 32px 12px; }
    .flash-btn { width:48px; height:48px; display:flex; align-items:center; justify-content:center; background:transparent; border:none; cursor:pointer; font-size:28px; }
    .shutter-btn {
      width:72px; height:72px; border-radius:50%; background:white;
      border:4px solid rgba(255,255,255,0.4); cursor:pointer;
      box-shadow:0 0 0 6px rgba(255,255,255,0.15); position:relative;
      transition:transform 0.12s;
    }
    .shutter-btn:active { transform:scale(0.9); }
    .shutter-btn.loading { animation:pulse 0.8s infinite; }
    .shutter-btn::after { content:''; width:56px; height:56px; border-radius:50%; background:white; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 6px rgba(255,255,255,0.15)} 50%{box-shadow:0 0 0 12px rgba(255,255,255,0.3)} }
    .color-hunt-btn { width:48px; height:48px; border-radius:10px; background:#1a1008; border:none; cursor:pointer; overflow:hidden; }
    .color-swatch { width:100%; height:100%; border-radius:10px; }
    .purple-divider { height:4px; background:linear-gradient(90deg,#7C3AED,#A78BFA,#7C3AED); margin:4px 0; border-radius:2px; }
    .gallery-strip { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 16px 20px; }
    .gallery-thumb { aspect-ratio:1/1; border-radius:16px; background:rgba(255,255,255,0.08); overflow:hidden; cursor:pointer; position:relative; transition:transform 0.15s; }
    .gallery-thumb:active { transform:scale(0.96); }
    .gallery-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .thumb-empty { width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.2); font-size:13px; font-family:'Mitr',sans-serif; }
    .thumb-date { position:absolute; bottom:6px; right:8px; font-size:10px; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:999px; backdrop-filter:blur(4px); }

    /* GALLERY PAGE */
    .gallery-page-scroll { flex:1; overflow-y:auto; padding:0 16px 16px; }
    .gallery-page-scroll::-webkit-scrollbar { display:none; }
    .month-bar {
      display:flex; align-items:center; gap:12px;
      background: var(--accent-cream); border-radius:18px;
      padding:12px 20px; margin-bottom:16px;
    }
    .month-nav-btn { background:none; border:none; cursor:pointer; color:#2C1F14; display:flex; align-items:center; padding:4px; border-radius:8px; }
    .month-nav-btn:active { background:rgba(0,0,0,0.08); }
    .month-label { font-family:'Dancing Script',cursive; font-size:34px; font-weight:700; color:#2C1F14; flex:1; text-align:center; }
    .photo-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
    .photo-cell { aspect-ratio:1/1; border-radius:12px; background:rgba(255,255,255,0.08); overflow:hidden; position:relative; cursor:pointer; transition:transform 0.15s; }
    .photo-cell:active { transform:scale(0.95); }
    .photo-cell img { width:100%; height:100%; object-fit:cover; display:block; }
    .cell-date { position:absolute; bottom:0; left:0; right:0; text-align:center; font-size:9px; color:rgba(255,255,255,0.85); background:rgba(0,0,0,0.4); padding:3px 0; backdrop-filter:blur(4px); }
    .cell-dots { position:absolute; bottom:4px; left:0; right:0; text-align:center; font-size:12px; color:rgba(255,255,255,0.4); line-height:1; }
    .capsule-btn {
      display:block; width:100%; margin-top:20px;
      background: var(--accent-cream); border:none; border-radius:999px;
      padding:16px; cursor:pointer;
      font-family:'Dancing Script',cursive; font-size:28px; font-weight:700; color:#2C1F14;
      letter-spacing:2px; text-align:center;
      box-shadow:0 4px 16px rgba(0,0,0,0.3); transition:transform 0.15s;
    }
    .capsule-btn:active { transform:scale(0.97); }
    .gallery-empty {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:12px; padding:60px 0;
      color:rgba(255,255,255,0.25); font-family:'Mitr',sans-serif; font-size:14px;
    }

    /* LIGHTBOX */
    .lightbox {
      position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,0.92); backdrop-filter:blur(8px);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
    }
    .lightbox.open { display:flex; }
    .lightbox-img {
      max-width:100%; max-height:75dvh;
      object-fit:contain; border-radius:12px;
    }
    .lightbox-bar {
      display:flex; gap:20px; margin-top:20px;
    }
    .lightbox-btn {
      background:rgba(255,255,255,0.12); border:none; border-radius:50%;
      width:52px; height:52px; display:flex; align-items:center; justify-content:center;
      color:white; cursor:pointer; transition:background 0.15s;
    }
    .lightbox-btn:active { background:rgba(255,255,255,0.25); }
    .lightbox-close {
      position:absolute; top:20px; right:20px;
      background:rgba(255,255,255,0.12); border:none; border-radius:50%;
      width:40px; height:40px; display:flex; align-items:center; justify-content:center;
      color:white; cursor:pointer;
    }
    .capsule-page-scroll { flex:1; overflow-y:auto; padding:0 16px 24px; }
    .capsule-page-scroll::-webkit-scrollbar { display:none; }
    .capsule-header-bar {
      display:flex; align-items:center; gap:10px;
      background: var(--accent-cream); border-radius:18px;
      padding:12px 18px; margin-bottom:16px;
    }
    .capsule-back-btn {
      background:none; border:none; cursor:pointer; color:#2C1F14;
      display:flex; align-items:center; flex-shrink:0;
    }
    .capsule-month-text {
      font-family:'Dancing Script',cursive; font-size:26px; font-weight:700; color:#2C1F14;
    }
    .capsule-date-range {
      font-family:'Space Grotesk',sans-serif; font-size:12px; color:#2C1F14;
      opacity:0.65; white-space:nowrap;
    }
    .capsule-collage-wrap {
      position:relative; background:white; border-radius:12px;
      overflow:hidden; margin-bottom:16px;
    }
    .capsule-collage-wrap canvas { display:block; width:100%; height:auto; border-radius:12px; }
    .capsule-arrow {
      position:absolute; top:50%; transform:translateY(-50%);
      background:rgba(255,255,255,0.7); border:none; border-radius:50%;
      width:36px; height:36px; display:flex; align-items:center; justify-content:center;
      color:#2C1F14; cursor:default; pointer-events:none;
    }
    .capsule-arrow.left  { left:10px; }
    .capsule-arrow.right { right:10px; }
    .capsule-action-bar {
      display:flex; align-items:center; justify-content:space-around;
      background: var(--accent-cream); border-radius:18px; padding:14px 20px;
    }
    .capsule-action-btn {
      background:none; border:none; cursor:pointer; color:#2C1F14;
      display:flex; align-items:center; justify-content:center;
      width:44px; height:44px; border-radius:12px; transition:background 0.15s;
    }
    .capsule-action-btn:active { background:rgba(0,0,0,0.08); }
    .capsule-empty {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:12px; padding:60px 0;
      color:rgba(255,255,255,0.25); font-family:'Mitr',sans-serif; font-size:14px;
    }
    .tag-back-btn {
      display:none;
      width:40px; height:40px; border-radius:50%;
      background:rgba(255,255,255,0.12);
      align-items:center; justify-content:center;
      border:none; cursor:pointer; color:var(--text-light);
      transition:background 0.15s;
    }
    .tag-back-btn:active { background:rgba(255,255,255,0.22); }
    .tag-back-btn.visible { display:flex; }
    .tag-grid-overlay {
      position:absolute; inset:0; z-index:6;
      display:none; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
      gap:2px; padding:2px; background:transparent;
    }
    .tag-grid-overlay.active { display:grid; }
    .tag-cell {
      background:rgba(0,0,0,0.75); border-radius:6px;
      overflow:hidden; position:relative; cursor:pointer;
      transition:opacity 0.15s;
    }
    .tag-cell.filled { background:#000; }
    .tag-cell img { width:100%; height:100%; object-fit:cover; display:block; }
    .tag-cell-num {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      color:rgba(255,255,255,0.15); font-size:22px; font-family:'Dancing Script',cursive;
      pointer-events:none;
    }
    .tag-cell.next-target { outline:2px solid rgba(255,255,255,0.5); }
    .guest-modal-backdrop {
      position:absolute; inset:0; z-index:100;
      display:none; align-items:flex-start; justify-content:center;
      padding-top:64px;
    }
    .guest-modal-backdrop.open { display:flex; }
    .guest-modal {
      background:rgba(70,52,34,0.93); backdrop-filter:blur(16px);
      border-radius:28px; padding:20px;
      width:calc(100% - 40px); max-width:340px;
      display:flex; flex-direction:column; align-items:center; gap:14px;
      box-shadow:0 8px 40px rgba(0,0,0,0.5);
      animation:modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalIn { from{opacity:0;transform:scale(0.88) translateY(-12px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .guest-tag-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; }
    .guest-tag-btn {
      border:none; border-radius:16px; padding:18px 0;
      font-family:'Dancing Script',cursive; font-size:20px; font-weight:700;
      color:white; cursor:pointer; transition:transform 0.12s, filter 0.12s;
      text-shadow:0 1px 3px rgba(0,0,0,0.25);
    }
    .guest-tag-btn:active { transform:scale(0.93); filter:brightness(0.88); }
    .guest-tag-btn.square   { background:#B8935A; }
    .guest-tag-btn.circle   { background:#8BBF3F; }
    .guest-tag-btn.view     { background:#2E8B6E; }
    .guest-tag-btn.beach    { background:#29B6D8; }
    .guest-tag-btn.building { background:#D4A882; color:#2C1F14; }
    .guest-tag-btn.flower   { background:#B07FCC; }
  </style>
</head>
<body>
<div class="phone-shell">

  <!-- PAGE 1: CAMERA -->
  <div class="page active" id="pageCam">
    <div class="top-bar" style="position:relative;">
      <div style="width:40px;"></div>
      <span class="page-pill" id="guestBtn" style="cursor:pointer; position:absolute; left:50%; transform:translateX(-50%);">quest</span>
      <div class="profile-btn" id="profileIcon" style="pointer-events:none; cursor:default;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
        </svg>
      </div>
      <button class="tag-back-btn" id="tagBackBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
        </svg>
      </button>
    </div>
    <div class="scroll-area">
      <div class="viewfinder-wrap">
        <div class="cam-placeholder" id="camPlaceholder">
          <svg width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="1.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/>
          </svg>
          <span style="font-family:'Mitr',sans-serif;font-size:16px;">แตะเพื่อเปิดกล้อง</span>
        </div>
        <div class="start-cam-overlay" id="startCamOverlay"></div>
        <video id="webcam" autoplay playsinline muted></video>
        <div class="cam-status" id="camStatus"></div>
        <div class="flash-overlay" id="flashOverlay"></div>
        <!-- 9-cell tag grid (hidden until tag selected) -->
        <div class="tag-grid-overlay" id="tagGridOverlay"></div>
      </div>
      <div class="controls-bar">
        <button class="flash-btn" id="flashBtn"><span>⚡</span></button>
        <button class="shutter-btn" id="snapBtn" disabled></button>
        <div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/>
          </svg>
        </div>
      </div>
      <div class="purple-divider"></div>
      <div class="gallery-strip" id="galleryStrip">
        <div class="gallery-thumb"><div class="thumb-empty">ยังไม่มีรูป</div></div>
        <div class="gallery-thumb"><div class="thumb-empty">ยังไม่มีรูป</div></div>
      </div>
    </div>
  </div>

  <!-- PAGE 2: GALLERY -->
  <div class="page" id="pageGallery">
    <div class="top-bar">
      <span class="page-pill">gallery</span>
      <button class="profile-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
        </svg>
      </button>
    </div>
    <div class="gallery-page-scroll">
      <div class="month-bar">
        <button class="month-nav-btn" id="monthBack">
          <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
          </svg>
        </button>
        <span class="month-label" id="monthLabel">May</span>
        <button class="month-nav-btn" id="monthFwd">
          <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/>
          </svg>
        </button>
      </div>
      <div class="photo-grid" id="photoGrid">
        <div class="gallery-empty" style="grid-column:span 3">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2" style="opacity:0.3">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Z"/>
          </svg>
          <span>ยังไม่มีรูปในเดือนนี้</span>
        </div>
      </div>
      <button class="capsule-btn" id="capsuleBtn">CAPSULE</button>
    </div>
  </div>

  <!-- PAGE 3: MONTHLY RECAP — removed -->

  <!-- PAGE 3: CAPSULE -->
  <div class="page" id="pageCapsule">
    <div class="top-bar">
      <span class="page-pill" style="letter-spacing:2px;">CAPSULE</span>
    </div>
    <div class="capsule-page-scroll">
      <div class="capsule-header-bar">
        <button class="capsule-back-btn" id="capsuleBackBtn">
          <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
          </svg>
        </button>
        <span class="capsule-month-text" id="capsuleMonthText">May</span>
        <span class="capsule-date-range" id="capsuleDateRange">01 - 31/05/2026</span>
      </div>
      <div class="capsule-collage-wrap" id="capsuleCollageWrap">
        <canvas id="capsuleCanvas"></canvas>
        <div class="capsule-arrow left">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
          </svg>
        </div>
        <div class="capsule-arrow right">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/>
          </svg>
        </div>
      </div>
      <div class="capsule-action-bar">
        <!-- save to gallery -->
        <button class="capsule-action-btn" id="capsuleSaveBtn" title="บันทึก">
          <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25H7.5a2.25 2.25 0 0 0-2.25 2.25v9a2.25 2.25 0 0 0 2.25 2.25h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25H15M9 12l3 3m0 0 3-3m-3 3V2.25"/>
          </svg>
        </button>
        <!-- open/share -->
        <button class="capsule-action-btn" id="capsuleOpenBtn" title="เปิด">
          <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="navCamera">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/>
      </svg>
      กล้อง
    </button>
    <button class="nav-btn" id="navGallery">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/>
      </svg>
      คลัง
    </button>
  </nav>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
      </svg>
    </button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="preview" />
    <div class="lightbox-bar">
      <!-- download -->
      <button class="lightbox-btn" id="lightboxSave">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25H7.5a2.25 2.25 0 0 0-2.25 2.25v9a2.25 2.25 0 0 0 2.25 2.25h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25H15M9 12l3 3m0 0 3-3m-3 3V2.25"/>
        </svg>
      </button>
      <!-- share -->
      <button class="lightbox-btn" id="lightboxShare">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- GUEST MODAL -->
  <div class="guest-modal-backdrop" id="guestModal">
    <div class="guest-modal">
      <div class="guest-tag-grid">
        <button class="guest-tag-btn square">square</button>
        <button class="guest-tag-btn circle">circle</button>
        <button class="guest-tag-btn view">view</button>
        <button class="guest-tag-btn beach">beach</button>
        <button class="guest-tag-btn building">building</button>
        <button class="guest-tag-btn flower">flower</button>
      </div>
    </div>
  </div>

</div>
<canvas id="canvas" style="display:none;"></canvas>
<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
